name: Verify Facebook domain-verification tag

# Runs on every push and pull request — i.e. on every deploy to Cloudflare Pages —
# so any new page that is missing the Facebook domain-verification meta tag fails
# this check and shows up as a red ✗ on the commit / PR.
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every HTML page has the domain-verification tag
        run: bash scripts/check-fb-domain-verification.sh
