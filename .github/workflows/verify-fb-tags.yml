name: Verify Meta tags (domain-verification + Pixel)

# Runs on every push and pull request — i.e. on every deploy to Cloudflare Pages —
# so any new page missing the Facebook domain-verification tag or the Meta Pixel
# fails this check and shows up as a red ✗ on the commit / PR.
on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check every HTML page has the domain-verification tag and the Meta Pixel
        run: bash scripts/check-fb-tags.sh
